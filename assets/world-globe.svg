<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Glowing world map globe">
  <defs>
    <radialGradient id="globeFill" cx="50%" cy="46%" r="58%">
      <stop offset="0" stop-color="#0b2f52" stop-opacity=".72"/>
      <stop offset=".52" stop-color="#061b31" stop-opacity=".88"/>
      <stop offset="1" stop-color="#010814" stop-opacity=".96"/>
