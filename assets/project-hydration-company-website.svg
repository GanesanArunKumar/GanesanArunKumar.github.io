  <text x="78" y="148" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Products, jar delivery services and customer enquiries online</text>
  <rect x="84" y="210" width="1504" height="560" rx="36" fill="#06101f" stroke="#38bdf8" stroke-opacity=".28"/>
