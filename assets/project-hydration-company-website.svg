      <rect x="226" width="190" height="116" rx="22" fill="#0b1a2c" stroke="#38bdf8" stroke-opacity=".25"/>
      <rect x="452" width="190" height="116" rx="22" fill="#0b1a2c" stroke="#38bdf8" stroke-opacity=".25"/>
      <text x="28" y="48" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Bottles</text>
      <text x="254" y="48" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Water Jars</text>
      <text x="480" y="48" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Delivery</text>
      <rect x="28" y="72" width="112" height="10" rx="5" fill="#38bdf8" opacity=".62"/>
      <rect x="254" y="72" width="112" height="10" rx="5" fill="#38bdf8" opacity=".62"/>
      <rect x="480" y="72" width="112" height="10" rx="5" fill="#38bdf8" opacity=".62"/>
    </g>
