<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Hydration company website illustration</title>
  <desc id="desc">Modern packaged drinking water website mockup with product catalogue, service showcase and enquiry cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".55" stop-color="#062032"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="water" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1672" height="941" fill="url(#bg)"/>
  <path d="M0 760c230-70 330 70 560 0s360-72 580 0 344 66 532-12v193H0z" fill="#0ea5e9" opacity=".1"/>
  <circle cx="1280" cy="190" r="300" fill="#38bdf8" opacity=".09"/>
