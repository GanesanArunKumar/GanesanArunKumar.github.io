    <text x="0" y="62" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="900">Clear business presence.</text>
    <text x="0" y="126" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="23">A professional website for bottled water products, jar delivery and customer discovery.</text>
    <rect x="0" y="178" width="196" height="56" rx="18" fill="url(#water)"/>
    <text x="44" y="214" fill="#03111f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">View Products</text>
    <g transform="translate(0 296)">
