<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Manufacturing ERP dashboard illustration</title>
  <desc id="desc">Dark enterprise dashboard showing inventory, product variants, purchasing, sales and invoicing workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.52" stop-color="#071427"/>
      <stop offset="1" stop-color="#04111f"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f2137" stop-opacity=".94"/>
      <stop offset="1" stop-color="#06101f" stop-opacity=".94"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1672" height="941" fill="url(#bg)"/>
  <path d="M0 170h1672M0 340h1672M0 510h1672M0 680h1672M0 850h1672M180 0v941M360 0v941M540 0v941M720 0v941M900 0v941M1080 0v941M1260 0v941M1440 0v941" stroke="#38bdf8" stroke-opacity=".05"/>
  <circle cx="1270" cy="170" r="310" fill="#0ea5e9" opacity=".08"/>
  <text x="72" y="96" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">Manufacturing ERP Platform</text>
  <text x="72" y="138" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Inventory, variants, purchasing, sales and invoicing in one workflow</text>
  <rect x="72" y="190" width="260" height="560" rx="26" fill="url(#panel)" stroke="#38bdf8" stroke-opacity=".28"/>
  <text x="108" y="246" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Operations</text>
  <g fill="none" stroke="#38bdf8" stroke-width="2">
    <rect x="108" y="284" width="188" height="44" rx="12" fill="#0ea5e9" fill-opacity=".2"/>
    <rect x="108" y="352" width="188" height="44" rx="12" opacity=".65"/>
    <rect x="108" y="420" width="188" height="44" rx="12" opacity=".65"/>
    <rect x="108" y="488" width="188" height="44" rx="12" opacity=".65"/>
    <rect x="108" y="556" width="188" height="44" rx="12" opacity=".65"/>
    <rect x="108" y="624" width="188" height="44" rx="12" opacity=".65"/>
  </g>
  <g fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">
    <text x="130" y="313">Products</text>
    <text x="130" y="381">Locations</text>
    <text x="130" y="449">Purchasing</text>
    <text x="130" y="517">Sales Orders</text>
    <text x="130" y="585">Invoices</text>
    <text x="130" y="653">Reports</text>
  </g>
  <rect x="378" y="190" width="790" height="560" rx="26" fill="url(#panel)" stroke="#38bdf8" stroke-opacity=".32"/>
  <g transform="translate(420 240)">
    <text x="0" y="0" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Product Variant Control</text>
    <text x="0" y="38" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="18">Stock tracked by location, size, colour and model.</text>
    <g transform="translate(0 80)">
      <rect width="210" height="96" rx="18" fill="#07182a" stroke="#38bdf8" stroke-opacity=".28"/>
      <rect x="246" width="210" height="96" rx="18" fill="#07182a" stroke="#38bdf8" stroke-opacity=".28"/>
      <rect x="492" width="210" height="96" rx="18" fill="#07182a" stroke="#38bdf8" stroke-opacity=".28"/>
      <text x="24" y="36" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Locations</text>
      <text x="24" y="70" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">12</text>
      <text x="270" y="36" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Product Variants</text>
      <text x="270" y="70" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">4,860</text>
      <text x="516" y="36" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="16">Open Orders</text>
      <text x="516" y="70" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">128</text>
    </g>
    <g transform="translate(0 226)" stroke="#38bdf8" stroke-width="3" fill="none" filter="url(#glow)">
      <circle cx="62" cy="62" r="48"/>
      <circle cx="226" cy="62" r="48"/>
      <circle cx="390" cy="62" r="48"/>
      <circle cx="554" cy="62" r="48"/>
      <path d="M110 62h68M274 62h68M438 62h68"/>
    </g>
    <g transform="translate(0 226)" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle">
      <text x="62" y="134">Purchase</text>
      <text x="226" y="134">Inventory</text>
      <text x="390" y="134">Sales</text>
      <text x="554" y="134">Invoice</text>
    </g>
    <g transform="translate(0 410)">
      <rect width="704" height="90" rx="18" fill="#06101f" stroke="#38bdf8" stroke-opacity=".22"/>
      <rect x="26" y="24" width="150" height="14" rx="7" fill="#38bdf8"/>
      <rect x="26" y="56" width="650" height="10" rx="5" fill="#38bdf8" opacity=".18"/>
      <rect x="26" y="56" width="470" height="10" rx="5" fill="#38bdf8" opacity=".65"/>
    </g>
  </g>
  <rect x="1212" y="190" width="388" height="560" rx="26" fill="url(#panel)" stroke="#38bdf8" stroke-opacity=".28"/>
  <text x="1250" y="246" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Stock Visibility</text>
  <g transform="translate(1250 300)">
    <rect width="312" height="56" rx="14" fill="#052033" stroke="#38bdf8" stroke-opacity=".25"/>
    <rect y="82" width="312" height="56" rx="14" fill="#052033" stroke="#38bdf8" stroke-opacity=".25"/>
    <rect y="164" width="312" height="56" rx="14" fill="#052033" stroke="#38bdf8" stroke-opacity=".25"/>
    <rect y="246" width="312" height="56" rx="14" fill="#052033" stroke="#38bdf8" stroke-opacity=".25"/>
    <text x="20" y="35" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Warehouse A</text>
    <text x="20" y="117" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Warehouse B</text>
    <text x="20" y="199" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Retail Outlet</text>
    <text x="20" y="281" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800">Transfer Queue</text>
  </g>
</svg>
