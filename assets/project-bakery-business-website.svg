<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
  <title id="title">Bakery business website illustration</title>
  <desc id="desc">Premium bakery website mockup showing product showcase, cake gallery and customer enquiry sections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".58" stop-color="#071425"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>
  <rect width="1672" height="941" fill="url(#bg)"/>
  <circle cx="260" cy="720" r="330" fill="#0ea5e9" opacity=".08"/>
  <circle cx="1440" cy="140" r="290" fill="#38bdf8" opacity=".08"/>
  <text x="72" y="98" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="46" font-weight="900">Bakery Business Website</text>
  <text x="72" y="144" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="800">Digital storefront, product showcase and enquiry flow</text>
  <rect x="84" y="220" width="470" height="520" rx="34" fill="#081827" stroke="#38bdf8" stroke-opacity=".3" filter="url(#shadow)"/>
  <text x="128" y="296" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900">Freshly baked</text>
  <text x="128" y="350" fill="#38bdf8" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="900">for every occasion.</text>
  <text x="128" y="412" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="22">Customers explore products, trust the brand and send enquiries from any device.</text>
  <rect x="128" y="480" width="182" height="52" rx="18" fill="url(#blue)"/>
  <text x="170" y="514" fill="#03111f" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Enquire Now</text>
