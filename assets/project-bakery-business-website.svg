    <rect x="252" width="216" height="196" rx="24" fill="#0f2137" stroke="#38bdf8" stroke-opacity=".22"/>
    <rect x="504" width="216" height="196" rx="24" fill="#0f2137" stroke="#38bdf8" stroke-opacity=".22"/>
    <circle cx="108" cy="74" r="44" fill="#38bdf8" opacity=".2"/>
    <circle cx="360" cy="74" r="44" fill="#38bdf8" opacity=".2"/>
    <circle cx="612" cy="74" r="44" fill="#38bdf8" opacity=".2"/>
    <rect x="38" y="136" width="140" height="12" rx="6" fill="#38bdf8"/>
    <rect x="290" y="136" width="140" height="12" rx="6" fill="#38bdf8"/>
    <rect x="542" y="136" width="140" height="12" rx="6" fill="#38bdf8"/>
    <rect x="54" y="162" width="108" height="10" rx="5" fill="#94a3b8" opacity=".55"/>
    <rect x="306" y="162" width="108" height="10" rx="5" fill="#94a3b8" opacity=".55"/>
    <rect x="558" y="162" width="108" height="10" rx="5" fill="#94a3b8" opacity=".55"/>
  </g>
  <rect x="1504" y="230" width="96" height="450" rx="36" fill="#07111f" stroke="#38bdf8" stroke-opacity=".36" filter="url(#shadow)"/>
  <rect x="1520" y="282" width="64" height="104" rx="16" fill="#0f2137"/>
  <rect x="1520" y="414" width="64" height="104" rx="16" fill="#0f2137"/>
  <rect x="1520" y="546" width="64" height="104" rx="16" fill="#0f2137"/>
  <rect x="720" y="782" width="720" height="76" rx="24" fill="#06101f" stroke="#38bdf8" stroke-opacity=".22"/>
  <text x="760" y="830" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Product showcase -> enquiries -> customer trust</text>
