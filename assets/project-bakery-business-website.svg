    <circle cx="28" cy="28" r="28" fill="#0ea5e9" opacity=".22"/>
    <circle cx="128" cy="28" r="28" fill="#0ea5e9" opacity=".22"/>
    <circle cx="228" cy="28" r="28" fill="#0ea5e9" opacity=".22"/>
    <text x="0" y="88" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Cakes</text>
    <text x="100" y="88" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Breads</text>
    <text x="200" y="88" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Events</text>
  </g>
  <rect x="616" y="96" width="820" height="650" rx="34" fill="#06101f" stroke="#38bdf8" stroke-opacity=".3" filter="url(#shadow)"/>
  <rect x="616" y="96" width="820" height="78" rx="34" fill="#0b1a2c"/>
  <circle cx="660" cy="135" r="8" fill="#38bdf8"/>
  <circle cx="688" cy="135" r="8" fill="#38bdf8" opacity=".55"/>
  <circle cx="716" cy="135" r="8" fill="#38bdf8" opacity=".35"/>
  <rect x="666" y="218" width="720" height="170" rx="24" fill="#0b1a2c" stroke="#38bdf8" stroke-opacity=".2"/>
  <text x="706" y="274" fill="#f8fbff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="900">Signature cake gallery</text>
  <text x="706" y="318" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="20">Product categories, custom cakes and business information in one place.</text>
  <g transform="translate(666 430)">
